name: Deploy Infra e Code

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 'Login na Azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Deploy da Infra (Bicep)'
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: 'rg-projeto-clima'
          template: ./main.bicep
          parameters: weatherApiKey=${{ secrets.OPENWEATHER_API_KEY }}